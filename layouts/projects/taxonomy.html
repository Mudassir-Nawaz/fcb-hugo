{{ define "main" }}
    <!--====================  breadcrumb area ====================-->
    {{ partial "hero.html" . }}
    <!--====================  End of breadcrumb area  ====================-->
    <div class="page-wrapper section-space--inner--120">
        <!--Service section start-->
        <div class="service-section">
            <div class="container">

                <div class="row">
                    <div class="col-lg-12">
                        <div class="service-item-wrapper">
                            <div class="row">
                                {{ range .Pages.ByWeight }}
                                {{ $link := .Permalink }}
                                <div class="col-lg-4 col-md-6 col-12 section-space--bottom--30">
                                    <div class="service-grid-item">
                                        {{ $placeholder := site.Params.placeholder }}
                                        <div class="service-grid-item__image">
                                            <div class="service-grid-item__image-wrapper">
                                                <a href="{{ $link }}">
                                                    <img src='{{ default $placeholder .Params.cover | relURL }}' class="img-fluid" alt="">
                                                </a>
                                            </div>
                                        </div>
                                        <div class="service-grid-item__content">
                                            <h3 class="title">
                                                <a href="{{ .Permalink }}">{{ .Title }}</a>
                                            </h3>
                                            <p class="subtitle">{{ .Description | truncate 100 }}</p>
                                            <a href="{{ .Permalink }}" class="see-more-link">SEE MORE</a>
                                        </div>
                                    </div>
                                </div>
                                {{ end }}
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        <!--Service section end-->
    </div>
{{ end }}
